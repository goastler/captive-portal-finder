name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: portalgun

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x86_64
            runner: ubuntu-latest
            use_cross: true
          - target: x86_64-unknown-linux-musl
            artifact_suffix: linux-x86_64-musl
            runner: ubuntu-latest
            use_cross: true
          - target: i686-unknown-linux-gnu
            artifact_suffix: linux-x86
            runner: ubuntu-latest
            use_cross: true
          - target: i686-unknown-linux-musl
            artifact_suffix: linux-x86-musl
            runner: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            artifact_suffix: linux-aarch64
            runner: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-musl
            artifact_suffix: linux-aarch64-musl
            runner: ubuntu-latest
            use_cross: true
          - target: armv7-unknown-linux-gnueabihf
            artifact_suffix: linux-armv7
            runner: ubuntu-latest
            use_cross: true
          - target: armv7-unknown-linux-musleabihf
            artifact_suffix: linux-armv7-musl
            runner: ubuntu-latest
            use_cross: true
          - target: arm-unknown-linux-gnueabihf
            artifact_suffix: linux-armv6-hf
            runner: ubuntu-latest
            use_cross: true
          - target: arm-unknown-linux-musleabihf
            artifact_suffix: linux-armv6-musl
            runner: ubuntu-latest
            use_cross: true
          - target: arm-unknown-linux-gnueabi
            artifact_suffix: linux-armv6
            runner: ubuntu-latest
            use_cross: true
          - target: armv5te-unknown-linux-gnueabi
            artifact_suffix: linux-armv5
            runner: ubuntu-latest
            use_cross: true
          - target: riscv64gc-unknown-linux-gnu
            artifact_suffix: linux-riscv64
            runner: ubuntu-latest
            use_cross: true
          - target: mipsel-unknown-linux-gnu
            artifact_suffix: linux-mipsel
            runner: ubuntu-latest
            use_cross: true
          - target: mips-unknown-linux-gnu
            artifact_suffix: linux-mips
            runner: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            artifact_suffix: macos-x86_64
            runner: macos-latest
            use_cross: false
          - target: aarch64-apple-darwin
            artifact_suffix: macos-aarch64
            runner: macos-latest
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi

      - name: Rename binary
        env:
          TARGET: ${{ matrix.target }}
          SUFFIX: ${{ matrix.artifact_suffix }}
        run: |
          cp "target/${TARGET}/release/${BINARY_NAME}" "${BINARY_NAME}-${SUFFIX}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.artifact_suffix }}
          path: ${{ env.BINARY_NAME }}-${{ matrix.artifact_suffix }}
          retention-days: 1

  publish:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-publish-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-publish-cargo-

      - name: Publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
